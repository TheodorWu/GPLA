processor:
  prompt_template: "In: What action should the robot take to <task>?\nOut:"
  answer_template: "In: What action should the robot take to <task>?\nOut: <caption> <action>"
  bins: 256
  min_action: -1.0
  max_action: 1.0
  max_length: 512 # maximum length of tokens
  use_extra: true # Set to true if MiniVLA or other VLA iwth QWEN Backbone
  predict_stop_token: true
vla:
  id: minivla
  freeze: vision
  generation_kwargs:
    temperature: 0.7
    do_sample: true
    top_p: 0.9
    # top_k: 50
clip:
  id: vision_action_grounded_clip
  checkpoint: contrastive-sepia-hare-h3-e3-sft.pt
  dim: 128
  target_vla: minivla
  fusion_order: action_vision # action_vision or vision_action -- the first term determines the first cross attention query
  custom_prompt_template: "<caption>" # add or remove <task> and <action> as needed
  freeze: pretrained_encoders # pretrained_encoders, vision_encoder, language_encoder, or none
dtype: bfloat16
